<html lang="ko">

<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@600;800&family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --sign:#1E5B4F;        /* 간판 초록 */
  --sign-deep:#153F37;
  --paper:#FAFAF7;       /* 백지 */
  --ink:#22271F;
  --ink-soft:#6B7166;
  --line:#E3E4DC;
  --amber:#B07B10;       /* 조건부·알림 */
  --amber-bg:#FBF3E1;
  --pen:#2B5BB7;         /* 볼펜 파랑 — 사용자 말풍선 */
  --stamp-ok:#1E5B4F;
  --card:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
summary::-webkit-details-marker{display:none}
button,.m-card{touch-action:manipulation}
html,body{height:100%}
body{background:#EDEEE8;font-family:"IBM Plex Sans KR",sans-serif;color:var(--ink);
     display:flex;justify-content:center}
.shell{width:100%;max-width:480px;height:100vh;height:100dvh;display:flex;flex-direction:column;
       background:var(--paper);box-shadow:0 0 40px rgba(30,40,30,.12)}
/* ── 헤더: 간판 ── */
header{background:var(--sign);color:#F3F6EF;padding:14px 18px 12px;flex:none}
.brand-eyebrow{font-size:.68rem;letter-spacing:.22em;opacity:.75;font-weight:500}
.brand{font-family:"Hahmlet",serif;font-weight:800;font-size:1.25rem;letter-spacing:.01em}
.brand small{font-family:"IBM Plex Sans KR";font-weight:400;font-size:.78rem;opacity:.8;margin-left:8px}
.mode-line{font-size:.68rem;opacity:.7;margin-top:2px}
/* ── 온보딩 ── */
.onboard{flex:1;overflow-y:auto;padding:26px 20px}
.onboard h2{font-family:"Hahmlet",serif;font-size:1.3rem;font-weight:800;margin-bottom:4px}
.onboard p.lead{color:var(--ink-soft);font-size:.9rem;margin-bottom:20px}
.m-card{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.m-card:hover,.m-card:focus-visible{border-color:var(--sign)}
.m-card b{font-size:.98rem}
.m-card .sub{color:var(--ink-soft);font-size:.8rem;margin-top:2px}
.divider{display:flex;align-items:center;gap:10px;color:var(--ink-soft);
         font-size:.75rem;margin:18px 0 12px}
.divider::before,.divider::after{content:"";flex:1;border-top:1px dashed var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
label{font-size:.72rem;color:var(--ink-soft);display:block;margin-bottom:3px}
input,select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
             font-family:inherit;font-size:16px;background:#fff;color:var(--ink)}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--sign);outline-offset:1px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--sign);
     color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:14px}
.btn:hover{background:var(--sign-deep)}
/* ── 알림 ── */
.alerts{flex:none;padding:10px 14px 4px;display:flex;flex-direction:column;gap:6px}
.alert-chip{background:var(--amber-bg);border:1px solid #EAD9AE;border-radius:9px;
            padding:7px 11px;font-size:.78rem;color:#6B5511;line-height:1.45}
/* ── 채팅 ── */
.chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:88%;line-height:1.6;font-size:.9rem;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--pen);color:#fff;
          border-radius:14px 14px 3px 14px;padding:10px 14px}
.msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--line);
         border-radius:14px 14px 14px 3px;padding:12px 14px}
.msg .disclaimer{display:block;margin-top:8px;font-size:.68rem;color:var(--ink-soft)}
/* ── 상세 카드: 영수증 감성 ── */
details{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
summary{cursor:pointer;font-size:.78rem;font-weight:700;color:var(--sign);list-style:none}
summary::before{content:"▸ "}
details[open] summary::before{content:"▾ "}
.v-card{position:relative;border:1px solid var(--line);border-radius:10px;
        padding:10px 12px;margin:8px 0;background:#FDFDFB}
.v-card .t{font-weight:700;font-size:.85rem;padding-right:56px}
.v-card .meta{font-size:.72rem;color:var(--ink-soft);margin-top:2px}
.reason{font-size:.78rem;margin-top:5px}
.reason.ok::before{content:"✓ ";color:var(--sign)}
.reason.chk::before{content:"? ";color:var(--amber);font-weight:700}
.evidence{border-left:3px solid var(--sign);background:#F2F5F1;padding:5px 10px;
          margin:4px 0 4px 12px;font-size:.74rem;color:#3E4A42}
.evidence::before{content:"공고 원문 · ";font-weight:700;color:var(--sign)}
/* 시그니처: 판정 도장 */
.stamp{position:absolute;top:8px;right:10px;transform:rotate(-8deg);
       border:2.5px solid var(--stamp-ok);color:var(--stamp-ok);border-radius:6px;
       font-family:"Hahmlet",serif;font-weight:800;font-size:.82rem;
       padding:2px 8px;letter-spacing:.15em;opacity:.9;
       animation:stampIn .25s cubic-bezier(.2,1.6,.4,1) both}
.stamp.cond{border-color:var(--amber);color:var(--amber)}
@keyframes stampIn{from{transform:rotate(-8deg) scale(1.6);opacity:0}
                   to{transform:rotate(-8deg) scale(1);opacity:.9}}
@media (prefers-reduced-motion:reduce){.stamp{animation:none}}
.metric-row{display:flex;gap:8px;margin:8px 0}
.metric{flex:1;background:#FDFDFB;border:1px solid var(--line);border-radius:9px;
        padding:8px;text-align:center}
.metric .n{font-family:"IBM Plex Mono",monospace;font-size:1.02rem;font-weight:500}
.metric .l{font-size:.66rem;color:var(--ink-soft)}
.src-note{font-size:.68rem;color:var(--ink-soft);margin-top:4px}
.p-row{border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin:8px 0;background:#FDFDFB}
.p-row .t{font-weight:700;font-size:.85rem}
.p-row .meta{font-size:.74rem;color:var(--ink-soft);margin-top:2px}
.p-row .why{font-size:.74rem;color:#3E4A42;margin-top:4px}
/* ── 입력부 ── */
.composer{flex:none;border-top:1px solid var(--line);background:#fff;padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
.quick{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
.quick button{flex:none;border:1px solid var(--line);background:var(--paper);color:var(--ink);
              border-radius:16px;padding:6px 12px;font-family:inherit;font-size:.78rem;cursor:pointer}
.quick button:hover{border-color:var(--sign);color:var(--sign)}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;border-radius:20px;padding:11px 16px}
.input-row button{flex:none;width:46px;border:none;border-radius:50%;background:var(--sign);
                  color:#fff;font-size:1.05rem;cursor:pointer}
.typing{color:var(--ink-soft);font-size:.8rem;align-self:flex-start;padding:6px 4px}
.hidden{display:none !important}
</style>
</head>

  const r=a.req,reasons=[],fails=[],y=years(m.founded);
  const push=(arr,field,detail)=>arr.push({detail,clause:(r.ev||{})[field]||""});
  if(r.min_years!=null)(y>=r.min_years?push(reasons,"min_years",`업력 ${y}년 → 최소 ${r.min_years}년 충족`)
                                      :push(fails,"min_years",`업력 ${y}년 → 최소 ${r.min_years}년 미달`));
  if(r.max_years!=null)(y<r.max_years?push(reasons,"max_years",`업력 ${y}년 → ${r.max_years}년 미만 충족`)
                                     :push(fails,"max_years",`업력 ${y}년 → ${r.max_years}년 미만 초과`));
  if(r.allowed_ksic){const hit=r.allowed_ksic.some(p=>m.ksic.startsWith(p));
    (hit?push(reasons,"allowed_ksic",`업종 ${m.ksic}(${m.ksic_name}) → 허용 업종 해당`)
        :push(fails,"allowed_ksic",`업종 ${m.ksic} → 허용 업종 [${r.allowed_ksic}] 비해당`));}
  if(r.regions){const hit=r.regions.some(x=>m.region.includes(x));
    (hit?push(reasons,"regions",`소재지 ${m.region} → 지역요건 충족`)
        :push(fails,"regions",`소재지 ${m.region} → 지역요건 [${r.regions}] 미충족`));}
  if(r.min_employees!=null)(m.employees>=r.min_employees
    ?push(reasons,"min_employees",`상시근로자 ${m.employees}인 → ${r.min_employees}인 이상 충족`)
    :push(fails,"min_employees",`상시근로자 ${m.employees}인 → ${r.min_employees}인 이상 미달`));
  if(r.max_employees!=null)(m.employees<r.max_employees
    ?push(reasons,"max_employees",`상시근로자 ${m.employees}인 → ${r.max_employees}인 미만 충족`)
    :push(fails,"max_employees",`상시근로자 ${m.employees}인 → ${r.max_employees}인 미만 초과`));
  if(r.required_certs){const miss=r.required_certs.filter(c=>!m.certs.includes(c));
    (miss.length?push(fails,"required_certs",`필수 인증 [${miss}] 미보유`)
                :push(reasons,"required_certs",`필수 인증 보유`));}
  const human=r.human||[];
  const status=fails.length?"INELIGIBLE":(human.length?"CONDITIONAL":"ELIGIBLE");
  const confidence=Math.round(r.conf*Math.pow(0.95,human.length)*1000)/1000;
  return {ann:a,status,reasons,fails,human,confidence};
}
const priority=v=>{
  const left=Math.max((new Date(v.ann.deadline)-Date.now())/864e5,0);
  return Math.max(0,1-left/180)-0.1*v.human.length;
};

/* ══════════ 에이전트 (F1~F4 포팅) ══════════ */
function policyRun(m){
  const today=new Date();
  const verdicts=ANNS.filter(a=>new Date(a.deadline)>=today).map(a=>evaluate(m,a));
  const hits=verdicts.filter(v=>v.status!=="INELIGIBLE")
                     .sort((a,b)=>priority(b)-priority(a));
  const summary=hits.length
    ?`📋 정책자금: 지원 가능성이 있는 공고 ${hits.length}건을 찾았어요. 우선 검토는 「${hits[0].ann.title}」(마감 ${hits[0].ann.deadline}, ${hits[0].ann.support})입니다.`
    :"📋 정책자금: 현재 프로필로 자동 판정된 적격 공고가 없어요. 프로필을 다시 확인해 볼까요?";
  return {summary,hits};
}
function districtRun(m){
  const d=SNAP.지역[m.region];
  if(!d)return{summary:`🗺️ 상권진단: ${m.region} 지표가 아직 준비되지 않았어요.`,score:null};
  const sec=d.업종[m.sector]||null;let score=50;const str=[],risk=[];
  score+=(d.유동인구지수-100)*0.5;
  (d.유동인구지수>=105?str:d.유동인구지수<95?risk:str).push(`유동인구지수 ${d.유동인구지수}`);
  const tr=(d.카드매출지수-d.prev.카드매출지수)/d.prev.카드매출지수*100;score+=tr*1.5;
  (tr>1?str:tr<-1?risk:str).push(`카드매출지수 ${d.카드매출지수} (전월 ${tr>=0?"+":""}${tr.toFixed(1)}%)`);
  score-=Math.max(d.임대료지수-100,0)*0.4;
  if(d.임대료지수>108)risk.push(`임대료지수 ${d.임대료지수} — 고정비 부담 유의`);
  if(sec){score-=Math.max(sec.연폐업률-10,0)*1.2;
    (sec.연폐업률>11?risk:str).push(`${m.sector}업 연폐업률 ${sec.연폐업률}% (점포 ${sec.점포수.toLocaleString()}곳, 평균 영업 ${sec.평균영업기간_년}년)`);}
  score=Math.round(Math.min(Math.max(score,5),95)*10)/10;
  const grade=score>=65?"양호":score>=45?"보통":"주의";
  return {summary:`🗺️ 상권진단: ${m.region} ${m.dong||""} ${m.sector}업 기준 상권 점수 ${score}점(${grade}). `
    +(str[0]?`강점: ${str[0]}. `:"")+(risk[0]?`유의점: ${risk[0]}.`:""),
    score,grade,str,risk,지표:{유동인구지수:d.유동인구지수,임대료지수:d.임대료지수,카드매출지수:d.카드매출지수},기준일:SNAP.기준일};
}
function productsRun(m,policyHits){
  const y=years(m.founded),purpose=m.purpose||"운전자금",recs=[];
  for(const p of PRODUCTS){
    if(!p.purpose.includes(purpose))continue;
    const rq=p.req,why=[];let ok=true;
    if(rq.min_years!=null){if(y>=rq.min_years)why.push(`업력 ${y}년 ≥ ${rq.min_years}년`);else ok=false;}
    if(rq.max_years!=null){if(y<rq.max_years)why.push(`업력 ${y}년 < ${rq.max_years}년 (창업 특례)`);else ok=false;}
    if(rq.max_employees!=null&&m.employees>rq.max_employees)ok=false;
    if(rq.sectors){if(rq.sectors.includes(m.sector))why.push(`${m.sector}업 — 매출연계 대상`);else ok=false;}
    if(!ok)continue;
    const bonus=(p.pair&&policyHits&&policyHits.length)?0.2:0;
    if(bonus)why.push("적격 정책자금과 결합 시 금리 절감 여지");
    recs.push({...p,why,rank:why.length*0.1+bonus});
  }
  recs.sort((a,b)=>b.rank-a.rank);
  const summary=recs.length
    ?`💳 금융상품: ${purpose} 목적으로 ${recs.length}개 상품이 조건에 맞아요. 우선 검토는 「${recs[0].name}」(한도 ${recs[0].max}억, ${recs[0].rate}).`
     +((policyHits&&policyHits.length&&recs[0].pair)?" 적격 정책자금과 묶으면 실부담 금리를 낮출 여지가 있어요.":"")
    :`💳 금융상품: ${purpose} 목적으로 자동 매칭된 상품이 없어요. 상담 연결을 추천드려요.`;
  return {summary,recs,purpose};
}
function monitorAlerts(m){
  const out=[],dr=SNAP.기준금리-SNAP.이전기준금리;
  if(Math.abs(dr)>=0.25)out.push(`기준금리 ${Math.abs(dr).toFixed(2)}%p ${dr<0?"인하":"인상"} (${SNAP.이전기준금리}%→${SNAP.기준금리}%) — ${dr<0?"변동금리 이자 부담 완화, 대환 검토 적기":"이자 부담 증가 유의"}`);
  const d=SNAP.지역[m.region];
  if(d){const chg=(d.카드매출지수-d.prev.카드매출지수)/d.prev.카드매출지수*100;
    if(Math.abs(chg)>=3)out.push(`${m.region} 카드매출지수 전월 대비 ${chg>=0?"+":""}${chg.toFixed(1)}% — ${chg>0?"상권 회복세, 재고·마케팅 확대 검토":"매출 둔화 신호, 운전자금 여력 점검"}`);}
  const today=new Date();
  for(const a of ANNS){const left=Math.floor((new Date(a.deadline)-today)/864e5);
    if(left>=0&&left<=14)out.push(`「${a.title}」 신청 마감 D-${left} (${a.deadline})`);}
  return out;
}

/* ══════════ 라우터·감사·합성 ══════════ */
const KW={policy:["정책자금","지원사업","정부지원","지원금","보조금","공고","정책"],
          product:["대출","금리","상품","보증","빌리","운전자금","시설자금","자금"],
          district:["상권","입지","장사","자리","동네","손님","유동인구","폐업","매출"]};
function route(q){
  const hits=Object.keys(KW).filter(i=>KW[i].some(k=>q.includes(k)));
  if(hits.includes("policy")&&hits.includes("product")&&!q.includes("대출")&&!q.includes("상품"))
    hits.splice(hits.indexOf("product"),1);
  return hits.length?hits:["smalltalk"];
}
const sanitize=t=>t.split("\n").filter(l=>l.trim()&&!FORBIDDEN.some(p=>l.includes(p))).join("\n");

async function synthesize(query,results,m){
  const facts=Object.values(results).map(r=>r.summary).join("\n\n");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:700,
        system:"소상공인 금융 파트너 챗봇입니다. 아래 '분석 결과'에 있는 사실만으로 사장님께 드리는 친근하고 간결한 답변을 쓰세요. 확정·보장 표현 금지, 수치는 결과에 있는 것만, 마지막에 다음 행동 제안 1개. 이모지 절 제목은 유지.",
        messages:[{role:"user",content:`사업자: ${m.name}\n질문: ${query}\n분석 결과:\n${facts}`}]})});
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    if(txt)return {text:sanitize(txt),live:true};
  }catch(e){/* 오프라인·차단 → 폴백 */}
  return {text:facts,live:false};
}

/* ══════════ UI ══════════ */
let M=null;const $=id=>document.getElementById(id);
const QUICK=["우리 동네 상권 어때?","받을 수 있는 정책자금 알려줘","대출 상품 추천해줘"];

function init(){
  $("merchantList").innerHTML=MERCHANTS.map((m,i)=>
    `<div class="m-card" tabindex="0" role="button" onclick="start(${i})" onkeydown="if(event.key==='Enter')start(${i})">
       <b>${m.name}</b><div class="sub">${m.ksic_name} · ${m.region} · 직원 ${m.employees}명 · ${m.purpose}</div></div>`).join("");
  $("fRegion").innerHTML=Object.keys(SNAP.지역).map(r=>`<option>${r}</option>`).join("");
  $("quick").innerHTML=QUICK.map(q=>`<button type="button" onclick="ask('${q}')">${q}</button>`).join("");
}
function start(i){M=MERCHANTS[i];enterMain();}
function startCustom(){
  const sector=$("fSector").value,[ksic,ksic_name]=KSIC_MAP[sector];
  M={name:$("fName").value||"우리가게",owner:$("fOwner").value||"사장",sector,ksic,ksic_name,
     founded:$("fFounded").value||"2024-01-01",region:$("fRegion").value,dong:"",
     employees:+$("fEmp").value||0,revenue_krw:(+$("fRev").value||0)*10000,certs:[],
     purpose:$("fPurpose").value};
  enterMain();
}
function enterMain(){
  $("onboard").classList.add("hidden");
  ["alerts","chat","composer"].forEach(id=>$(id).classList.remove("hidden"));
  $("hdrName").textContent=M.name;
  $("alerts").innerHTML=monitorAlerts(M).map(a=>`<div class="alert-chip">🔔 ${a}</div>`).join("");
  botBubble(`안녕하세요 ${M.owner} 사장님! 👋 ${M.name}의 금융 파트너예요.\n상권 진단, 정책자금 찾기, 대출 상품 추천을 도와드릴 수 있어요. 아래 버튼을 누르거나 편하게 물어보세요.`);
  $("query").focus();
}
function bubble(cls,html){const el=document.createElement("div");el.className="msg "+cls;
  el.innerHTML=html;$("chat").appendChild(el);$("chat").scrollTop=$("chat").scrollHeight;return el;}
const esc=s=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function botBubble(text,detailHtml=""){
  bubble("bot",esc(text).replace(/\n/g,"<br>")+detailHtml+
    `<span class="disclaimer">${DISCLAIMER}</span>`);}

function detailsHtml(results){
  let h="";
  if(results.policy&&results.policy.hits.length){
    h+=`<details><summary>정책자금 판정 상세 (${results.policy.hits.length}건 · 근거 포함)</summary>`;
    for(const v of results.policy.hits){
      h+=`<div class="v-card"><span class="stamp ${v.status==="CONDITIONAL"?"cond":""}">${v.status==="ELIGIBLE"?"적 격":"조건부"}</span>
          <div class="t">${v.ann.title}</div>
          <div class="meta">${v.ann.agency} · 마감 ${v.ann.deadline} · ${v.ann.support} · 판정 신뢰도 ${v.confidence.toFixed(2)}</div>`;
      for(const r of v.reasons){h+=`<div class="reason ok">${r.detail}</div>`;
        if(r.clause)h+=`<div class="evidence">${r.clause}</div>`;}
      for(const c of v.human)h+=`<div class="reason chk">확인 필요 — ${c}</div>`;
      h+=`</div>`;}
    h+=`</details>`;}
  if(results.product&&results.product.recs.length){
    h+=`<details><summary>상품 추천 상세 (${results.product.recs.length}건)</summary>`;
    for(const p of results.product.recs)
      h+=`<div class="p-row"><div class="t">${p.name}</div>
          <div class="meta">한도 ${p.max}억 · ${p.rate}</div>
          <div class="why">${p.desc} · ${p.why.join(" · ")}</div></div>`;
    h+=`</details>`;}
  if(results.district&&results.district.score!=null){const d=results.district;
    h+=`<details><summary>상권 지표 상세 (기준일 ${d.기준일})</summary><div class="metric-row">`
      +Object.entries(d.지표).map(([k,v])=>`<div class="metric"><div class="n">${v}</div><div class="l">${k}</div></div>`).join("")
      +`</div>`+d.str.map(s=>`<div class="reason ok">${s}</div>`).join("")
      +d.risk.map(r=>`<div class="reason chk">${r}</div>`).join("")
      +`<div class="src-note">점포수 출처: 스냅샷(시연용 가정치) — 실서비스는 소진공 상가정보 API</div></details>`;}
  return h;
}

async function ask(q){
  bubble("user",esc(q));
  const typing=bubble("typing","사장님 상황에 맞춰 확인 중…");
  const intents=route(q),results={};
  if(intents.includes("policy"))results.policy=policyRun(M);
  if(intents.includes("product"))results.product=productsRun(M,results.policy?results.policy.hits:null);
  if(intents.includes("district"))results.district=districtRun(M);
  if(intents[0]==="smalltalk"&&intents.length===1){
    typing.remove();
    botBubble(`무엇이든 물어보세요, ${M.owner} 사장님! 예를 들면 — "우리 동네 상권 어때?", "정책자금 뭐 있어?", "운전자금 대출 추천해줘"`);
    return;
  }
  const synth=await synthesize(q,results,M);
  typing.remove();
  botBubble(synth.text,detailsHtml(results));
  $("modeLine").textContent=`판정: 룰 엔진 · 문장: ${synth.live?"Claude LIVE":"템플릿(폴백)"} · 상권지표: 시연용 가정치`;
}
function onSend(e){e.preventDefault();const q=$("query").value.trim();
  if(!q)return;$("query").value="";ask(q);}
init();
</script>
