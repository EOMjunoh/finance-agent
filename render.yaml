services:
  - type: web
    name: finance-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/update_rates.py; uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ECOS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
